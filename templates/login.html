<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Đăng nhập - GVCN AI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:Inter,sans-serif;

            background:linear-gradient(135deg,#2563eb,#1d4ed8);

            display:flex;

            justify-content:center;

            align-items:center;

            height:100vh;

        }

        .login-card{

            width:420px;

            background:white;

            border-radius:22px;

            padding:45px;

            box-shadow:0 20px 60px rgba(0,0,0,.2);

        }

        .logo{

            text-align:center;

            margin-bottom:35px;

        }

        .logo i{

            font-size:70px;

            color:#2563eb;

        }

        .logo h2{

            margin-top:15px;

            font-weight:800;

        }

        .logo p{

            color:#64748b;

            margin-top:8px;

        }

        .form-control{

            height:50px;

            border-radius:12px;

        }

        .btn-login{

            width:100%;

            height:52px;

            border:none;

            border-radius:12px;

            background:#2563eb;

            color:white;

            font-size:17px;

            font-weight:700;

            margin-top:10px;

        }

        .btn-login:hover{

            background:#1d4ed8;

        }

        .footer{

            text-align:center;

            margin-top:25px;

            color:#94a3b8;

            font-size:14px;

        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="logo">

        <i class="bi bi-cpu-fill"></i>

        <h2>GVCN AI</h2>

        <p>
            Hệ thống hỗ trợ ra quyết định<br>
            cho giáo viên chủ nhiệm
        </p>

    </div>

    <form action="/dashboard">

        <div class="mb-3">

            <label class="form-label">

                Tên đăng nhập

            </label>

            <input
                type="text"
                class="form-control"
                placeholder="Nhập tên đăng nhập">

        </div>

        <div class="mb-4">

            <label class="form-label">

                Mật khẩu

            </label>

            <input
                type="password"
                class="form-control"
                placeholder="Nhập mật khẩu">

        </div>

        <button class="btn-login">

            <i class="bi bi-box-arrow-in-right"></i>

            Đăng nhập

        </button>

    </form>

    <div class="footer">

        © 2026 GVCN AI<br>

        Nguyễn Thanh Tuấn - Trường Lê Quý Đôn

    </div>

</div>

</body>

</html>
